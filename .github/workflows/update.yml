name: Auto Update Abema Playlist

on:
  push:
    branches:
      - main
  schedule:
    - cron: '*/15 * * * *'  # BERJALAN SETIAP 15 menit
  workflow_dispatch: 
    inputs:
      reason:
        description: 'Alasan trigger'
        required: false
        default: 'Update dari Pipedream'
        # Tetap bisa dijalankan manual

jobs:
  update-file:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download and Edit File
        run: |
          # Mengambil file dan mengganti ==" menjadi "
          curl -L -s "https://raw.githubusercontent.com/dbghelp/Abema-TV/refs/heads/main/abema.m3u8" | sed 's/\x3d\x3d\x22/\x22/g' > abema_fixed.m3u8

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add abema_fixed.m3u8
          # Hanya commit jika ada perubahan konten untuk menghindari spam commit kosong
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update playlist jam: $(date +'%H:%M')" && git push)
